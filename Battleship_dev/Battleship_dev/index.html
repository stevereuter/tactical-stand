<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
    <title>Battleship</title>

    <link href="//maxcdn.bootstrapcdn.com/bootstrap/3.3.2/css/bootstrap.min.css" rel="stylesheet" />
    <link href="//maxcdn.bootstrapcdn.com/bootswatch/3.3.2/slate/bootstrap.min.css" rel="stylesheet" />
    <link href="//maxcdn.bootstrapcdn.com/font-awesome/4.3.0/css/font-awesome.min.css" rel="stylesheet" />
</head>
<body>
    <header class="page-header">
        <h1><span class="fa fa-ship"></span> Battleship <small>by Steve Reuter</small></h1>
    </header>

    <div class="container">
        <div class="row">
            <div id="tagetPanel" class="col-md-6 hidden">
                <div class="panel panel-default">
                    <div class="panel-heading">
                        <h3 class="panel-title"><span class="fa fa-rocket"></span> Opponent Area</h3>
                    </div>
                    <div class="panel-body ">
                        <span class="label label-info">Targets: <span id="oppTargets">10</span></span>
                        <span class="label label-success">Hits: <span id="oppHits">0</span></span>
                        <span class="label label-danger">Misses: <span id="oppMisses">0</span></span>
                        <span class="label label-info">Accuracy: <span id="oppAc">0</span>%</span>
                        <span class="label label-success">Total Hits: <span id="oppTotal">0</span></span>
                        <div class="text-center">
                            <canvas id="opponentArea" width="400" height="400"></canvas>
                        </div>
                        <div class="progress">
                            <div id="playerProgress" class="progress-bar progress-bar-success" style="width: 0">
                            </div>
                        </div>
                    </div>
                    <div class="panel-footer">
                        <button id="fire" class="btn btn-success"><span class="fa fa-rocket"></span> <u>F</u>ire</button>
                        <button id="targetRandom" class="btn btn-warning"><span class="fa fa-crosshairs"></span> Auto <u>T</u>arget</button>
                        <button id="startOver" class="btn btn-danger"><span class="fa fa-times"></span> <u>S</u>tart Over</button>
                    </div>
                </div>
            </div>
            <div id="fleetPanel" class="col-md-6 hidden">
                <div class="panel panel-default">
                    <div class="panel-heading">
                        <h3 class="panel-title"><span class="fa fa-ship"></span> Available Ships</h3>
                    </div>
                    <div class="panel-body">
                        <dl class="dl-horizontal">
                            <dt>Aircraft carrier:</dt>
                            <dd id="len5">IN_CODE</dd>
                            <dt>Battleship:</dt>
                            <dd id="len4">IN_CODE</dd>
                            <dt>Destroyer:</dt>
                            <dd id="len3">IN_CODE</dd>
                            <dt>Patrol boat:</dt>
                            <dd id="len2">IN_CODE</dd>
                        </dl>

                    </div>
                    <div class="panel-footer">
                        <h4 class="inline">Remaining Ships: <span id="remainingShips">IN_CODE</span></h4>

                    </div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="panel panel-default">
                    <div class="panel-heading">
                        <h3 class="panel-title"><span class="fa fa-shield"></span> Player Area</h3>
                    </div>
                    <div class="panel-body">
                        <span class="label label-warning">Total Hits:: <span id="plrTotal">0</span></span>
                        <span class="label label-danger">Ships Lost: <span id="plrLost">0</span></span>
                        <span id="plrStats" class="hidden">
                            <span class="label label-info">Ship ID: <span id="plrID">0</span></span>
                            <span class="label label-danger">Damage: <span id="plrDamage">0</span>%</span>
                        </span>
                        <div class="text-center">
                            <canvas id="playerArea" width="400" height="400"></canvas>
                        </div>
                        <div class="progress">
                            <div id="opponentProgress" class="progress-bar progress-bar-danger" style="width: 0">
                            </div>
                        </div>
                    </div>
                    <div class="panel-footer">

                        <button id="fleetDone" class="btn btn-success" disabled><span class=" fa fa-check"></span> <u>R</u>eady</button>
                        <button id="fleetRandom" class="btn btn-warning"><span class="fa fa-ship"></span> Auto <u>P</u>lace</button>
                        <button id="fleetReset" class="btn btn-danger"><span class="fa fa-undo"></span> <u>C</u>lear</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-2.1.3.min.js"></script>
    <script src="//maxcdn.bootstrapcdn.com/bootstrap/3.3.2/js/bootstrap.min.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
