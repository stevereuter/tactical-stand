<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
    <title>Battleship</title>

    <link href="css/bootstrap.css" rel="stylesheet" />
    <link href="css/bootstrap-theme.css" rel="stylesheet" />
    <link href="css/bootstrap-slate.css" rel="stylesheet" />
    <link href="css/font-awesome.css" rel="stylesheet" />
</head>
<body>
    <header class="page-header">
        <h1><span class="fa fa-ship"></span> Battleship <small>by Steve Reuter</small></h1>
    </header>

    <div class="container">
        <div class="row">
            <div class="col-md-6">
                <div class="panel panel-default">
                    <div class="panel-heading">
                        <h3 class="panel-title"><span class="fa fa-rocket"></span> Opponent Area</h3>
                    </div>
                    <div class="panel-body">
                        <canvas id="opponentArea" width="400" height="400"></canvas>
                    </div>
                    <div class="panel-footer">
                        <p>Opponent's status - X: <span id="oppX" class="text-danger"></span>, Y: <span id="oppY" class="text-danger"></span>, Data: <span id="oppD"></span></p>
                    </div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="panel panel-default">
                    <div class="panel-heading">
                        <h3 class="panel-title"><span class="fa fa-shield"></span> Player Area</h3>
                    </div>
                    <div class="panel-body">
                        <canvas id="playerArea" width="400" height="400"></canvas>
                    </div>
                    <div class="panel-footer">
                        
                        <p>My fleet status - X: <span id="plrX" class="text-danger"></span>, Y: <span id="plrY" class="text-danger"></span>, Data: <span id="plrD"></span></p>
                    </div>
                </div>
            </div>
        </div>
    </div class="container">
    <script src="js/jquery-2.1.3.js"></script>
    <script src="js/bootstrap.js"></script>
    <script src="js/app/main.js"></script>
</body>
</html>
